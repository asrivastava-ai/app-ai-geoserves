window.seedVessels = async () => {
  const log = document.getElementById('log');
  log.innerHTML = '';
  const addLog = (msg, cls='') => log.innerHTML += `<span class="${cls}">${msg}\n</span>`;

  addLog('Starting upload of ' + VESSELS.length + ' vessels...\n');

  let ok = 0, fail = 0;
  for (const vsl of VESSELS) {
    try {
      const id = vsl.name.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
      const clean = {};
      for (const [k,v] of Object.entries(vsl)) {
        if (v !== null) clean[k] = v;
      }
      clean.source = 'seed';
      clean.addedAt = new Date().toISOString();
      await setDoc(doc(collection(db, 'vessels'), id), clean);
      addLog(`✅ ${vsl.name}`, 'ok');
      ok++;
    } catch(e) {
      addLog(`❌ ${vsl.name}: ${e.message}`, 'err');
      fail++;
    }
  }
  addLog(`\n🎉 DONE — ${ok} uploaded, ${fail} failed`, 'done');
};
